name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Design consistency check
        run: npm run design:check

      - name: Design drift check
        run: npm run design:drift

      - name: Production build
        run: npm run build
